<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Portal — GIGATT Geomapper</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .driver-portal { max-width: 480px; margin: 2rem auto; padding: 1.5rem; }
    .driver-portal h1 { margin-bottom: 1rem; font-size: 1.1rem; }
    .driver-portal .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
    .driver-portal .placeholder { color: var(--text-muted); font-size: 0.9rem; }
    .driver-portal button { padding: 0.5rem 1rem; background: var(--accent); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; }
    .driver-portal .driver-job-route { font-weight: 500; margin-bottom: 0.35rem; }
    .driver-portal .driver-job-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .driver-portal .driver-nav-link { display: inline-block; margin-top: 0.5rem; padding: 0.4rem 0.8rem; background: var(--accent); color: #0d1117; border-radius: 4px; text-decoration: none; font-size: 0.9rem; }
    .driver-portal .driver-nav-link:hover { filter: brightness(1.1); }
    .driver-portal .location-status { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="driver-portal">
    <h1>Driver Portal</h1>
    <div id="driverAssignmentCard" class="card">
      <h2 style="margin: 0 0 0.5rem 0; font-size: 0.95rem;">Current assignment</h2>
      <p class="placeholder">Loading…</p>
    </div>
    <div class="card">
      <h2 style="margin: 0 0 0.5rem 0; font-size: 0.95rem;">Permits</h2>
      <p class="placeholder">Permit documents for your current job will appear here.</p>
    </div>
    <div class="card">
      <h2 style="margin: 0 0 0.5rem 0; font-size: 0.95rem;">Availability</h2>
      <p class="placeholder">Availability calendar — coming soon.</p>
    </div>
    <div class="card">
      <h2 style="margin: 0 0 0.5rem 0; font-size: 0.95rem;">Profile</h2>
      <p id="driverProfileName" class="placeholder">—</p>
      <p class="location-status" id="locationStatus">Location: requesting…</p>
    </div>
    <button id="signOutBtn">Sign out</button>
  </div>
  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/driver-portal.js"></script>
  <script>
    (function() {
      window.GeomapperAuth.init().then(function(hasAuth) {
        if (!hasAuth) {
          window.location.href = 'login.html';
          return;
        }
        window.GeomapperAuth.guardPage(false, function() {
          var supabase = window.GeomapperAuth.supabase;
          if (supabase) {
            supabase.auth.getSession().then(function(r) {
              var session = r.data && r.data.session;
              if (session && window.DriverPortal) window.DriverPortal.init(session);
            });
          }
          // Avoid triggering the browser geolocation permission flow on native platforms.
          // The background-geolocation plugin handles permissions for Android.
          if (navigator.geolocation && !(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform())) {
            navigator.geolocation.getCurrentPosition(
              function() {
                var el = document.getElementById('locationStatus');
                if (el) el.textContent = 'Location: sharing with dispatch when you have an assignment.';
              },
              function() {
                var el = document.getElementById('locationStatus');
                if (el) el.textContent = 'Location: permission denied or unavailable.';
              }
            );
          }
        });
      });

      document.getElementById('signOutBtn').addEventListener('click', function() {
        if (window.DriverPortal && window.DriverPortal.stop) window.DriverPortal.stop();
        if (window.GeomapperAuth.supabase) {
          window.GeomapperAuth.supabase.auth.signOut().then(function() {
            window.location.href = 'login.html';
          });
        } else {
          window.location.href = 'login.html';
        }
      });
    })();
  </script>
</body>
</html>
