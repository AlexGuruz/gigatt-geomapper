<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — GIGATT Geomapper</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .login-container { max-width: 360px; margin: 4rem auto; padding: 2rem; }
    .login-container h1 { margin-bottom: 1.5rem; font-size: 1.2rem; }
    .login-container label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.25rem; }
    .login-container input { width: 100%; padding: 0.5rem 0.75rem; margin-bottom: 1rem; background: var(--bg-dark); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: inherit; }
    .login-container button { width: 100%; padding: 0.6rem; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-family: inherit; font-weight: 500; cursor: pointer; }
    .login-container button:hover { background: var(--accent-hover); }
    .login-container button:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error { color: #f85149; font-size: 0.85rem; margin-top: 0.5rem; }
    .backend-connect { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .backend-connect label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.25rem; }
    .backend-connect input { width: 100%; padding: 0.5rem 0.75rem; margin-bottom: 0.5rem; background: var(--bg-dark); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: inherit; font-size: 0.9rem; }
    .backend-connect button { padding: 0.5rem 1rem; background: var(--card-bg); color: var(--text); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: inherit; }
    .backend-connect button:hover { background: var(--border); }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Sign In</h1>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
      <button type="submit" id="submitBtn">Sign in</button>
      <div id="loginError" class="login-error" style="display: none;"></div>
    </form>
    <div id="backendConnect" class="backend-connect" style="display: none;">
      <label for="backendUrl">Connect to backend (e.g. StackBlitz)</label>
      <input type="url" id="backendUrl" placeholder="https://your-app.up.railway.app" autocomplete="off">
      <button type="button" id="backendConnectBtn">Connect & reload</button>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function() {
      var form = document.getElementById('loginForm');
      var errEl = document.getElementById('loginError');
      var btn = document.getElementById('submitBtn');
      if (!window.GeomapperAuth) return;
      window.GeomapperAuth.init().then(function(hasAuth) {
        var supa = window.GeomapperAuth.supabase;
        if (hasAuth && supa) {
          supa.auth.getSession().then(function(r) {
            if (r.data && r.data.session) {
              window.GeomapperAuth.redirectByRole(r.data.session);
              return;
            }
          });
        }
        if (form) {
          if (hasAuth && supa) {
            form.addEventListener('submit', function(e) {
              e.preventDefault();
              errEl.style.display = 'none';
              btn.disabled = true;
              var email = document.getElementById('email').value;
              var password = document.getElementById('password').value;
              window.GeomapperAuth.supabase.auth.signInWithPassword({ email: email, password: password })
                .then(function(r) {
                  if (r.error) {
                    errEl.textContent = r.error.message || 'Sign in failed';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    return;
                  }
                  window.GeomapperAuth.redirectByRole(r.data.session);
                })
                .catch(function(e) {
                  errEl.textContent = e.message || 'Sign in failed';
                  errEl.style.display = 'block';
                  btn.disabled = false;
                });
            });
          } else {
            var connectEl = document.getElementById('backendConnect');
            var urlInput = document.getElementById('backendUrl');
            var connectBtn = document.getElementById('backendConnectBtn');
            if (connectEl) connectEl.style.display = 'block';
            if (connectBtn && urlInput) {
              connectBtn.addEventListener('click', function() {
                var url = (urlInput.value || '').trim().replace(/\/$/, '');
                if (!url) return;
                try {
                  new URL(url);
                } catch (e) {
                  errEl.textContent = 'Enter a valid URL (e.g. https://your-app.up.railway.app)';
                  errEl.style.display = 'block';
                  return;
                }
                try {
                  localStorage.setItem('geomapper_api_base', url);
                  window.location.reload();
                } catch (e) {
                  errEl.textContent = 'Could not save; try setting web/js/config.js manually.';
                  errEl.style.display = 'block';
                }
              });
            }
          }
        }
      });
    })();
  </script>
</body>
</html>
